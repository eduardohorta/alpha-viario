name: ci

on:
  push:
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cadastro de pontos válido
        run: python3 scripts/pontos.py validate

      - name: public-check (porteiro de publicação)
        run: python3 scripts/public_check.py

      - name: Integridade dos insumos versionados
        run: python3 scripts/verify_data.py

      - name: Testes
        run: python3 -m unittest discover -s tests -v
